apiVersion: apps/v1
kind: Deployment
metadata:
  name: licensemanager-api
  namespace: licensemanager
  labels:
    app: licensemanager-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: licensemanager-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: licensemanager-api
    spec:
      containers:
      - name: api
        image: licensemanager/api:latest  # Replace with your registry
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: licensemanager-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: licensemanager-secrets
              key: ConnectionStrings__DefaultConnection
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: licensemanager-secrets
              key: ConnectionStrings__Redis
        - name: Jwt__Secret
          valueFrom:
            secretKeyRef:
              name: licensemanager-secrets
              key: JWT_SECRET
        - name: Jwt__Issuer
          valueFrom:
            configMapKeyRef:
              name: licensemanager-config
              key: Jwt__Issuer
        - name: Jwt__Audience
          valueFrom:
            configMapKeyRef:
              name: licensemanager-config
              key: Jwt__Audience
        - name: Jwt__ExpiryMinutes
          valueFrom:
            configMapKeyRef:
              name: licensemanager-config
              key: Jwt__ExpiryMinutes
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: licensemanager-api-service
  namespace: licensemanager
  labels:
    app: licensemanager-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: licensemanager-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: licensemanager-api-hpa
  namespace: licensemanager
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: licensemanager-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
