apiVersion: v1
kind: Secret
metadata:
  name: licensemanager-secrets
  namespace: licensemanager
type: Opaque
stringData:
  # PostgreSQL Credentials
  POSTGRES_PASSWORD: "ChangeThisSecurePassword123!"
  
  # Redis Credentials
  REDIS_PASSWORD: "ChangeThisRedisPassword123!"
  
  # JWT Secret (256-bit)
  JWT_SECRET: "ChangeThisVerySecure256BitSecretKeyInProduction!!"
  
  # Database Connection String
  ConnectionStrings__DefaultConnection: "Host=postgres-service;Port=5432;Database=license_manager;Username=postgres;Password=ChangeThisSecurePassword123!"
  
  # Redis Connection String
  ConnectionStrings__Redis: "redis-service:6379,password=ChangeThisRedisPassword123!"
---
# Note: In production, use external secret management like:
# - Azure Key Vault
# - AWS Secrets Manager
# - HashiCorp Vault
# - Kubernetes External Secrets Operator
