apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: licensemanager-ingress
  namespace: licensemanager
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  tls:
  - hosts:
    - api.licensemanager.com
    secretName: licensemanager-tls
  rules:
  - host: api.licensemanager.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: licensemanager-api-service
            port:
              number: 80
---
# Alternative Ingress for Admin Panel (Next.js)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: licensemanager-admin-ingress
  namespace: licensemanager
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - admin.licensemanager.com
    secretName: licensemanager-admin-tls
  rules:
  - host: admin.licensemanager.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: licensemanager-admin-service
            port:
              number: 80
